<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Connects</title>

  <!-- Firebase SDK (compat) -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
    html, body { height: 100%; background: #08080F; }
    body { font-family: 'Inter', -apple-system, sans-serif; color: #fff; }
    #root { display: flex; justify-content: center; min-height: 100vh; background: #0d0d0d; }

    .app-shell {
      width: 100%; max-width: 430px; min-height: 100vh;
      background: #08080F; position: relative;
      display: flex; flex-direction: column; overflow: hidden;
      box-shadow: 0 0 80px rgba(0,0,0,0.8);
    }
    .screen-scroll { flex: 1; overflow-y: auto; overflow-x: hidden; padding-bottom: 88px; }
    ::-webkit-scrollbar { display: none; }
    * { scrollbar-width: none; }

    @keyframes livePulse { 0%,100%{opacity:1;transform:scale(1);}50%{opacity:.4;transform:scale(0.8);} }
    @keyframes fadeUp { from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);} }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes toastIn { from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);} }
    @keyframes toastOut { from{opacity:1;}to{opacity:0;} }

    .live-dot { width:7px;height:7px;border-radius:50%;background:#10B981;animation:livePulse 1.6s ease-in-out infinite;flex-shrink:0; }
    .animate-in { animation: fadeUp 0.35s ease-out forwards; }

    button { cursor:pointer;border:none;outline:none;font-family:inherit;transition:transform 0.12s,opacity 0.12s; }
    button:active:not(:disabled) { transform:scale(0.96); }
    input, textarea, select { font-family:inherit;outline:none;resize:none; }
    input::placeholder, textarea::placeholder { color:rgba(255,255,255,0.3); }

    .card-press { transition:transform 0.15s,background 0.15s; cursor:pointer; }
    .card-press:active { transform:scale(0.985); }

    .gradient-text { background:linear-gradient(135deg,#A78BFA,#EC4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text; }
    .btn-primary { background:linear-gradient(135deg,#7C3AED,#C026D3);color:#fff;font-weight:700;border:none;box-shadow:0 4px 20px rgba(124,58,237,0.4); }
    .btn-primary:active { box-shadow:0 2px 10px rgba(124,58,237,0.3); }

    .input-field {
      width:100%;padding:14px 16px;border-radius:14px;font-size:15px;font-weight:500;
      background:rgba(255,255,255,0.06);border:1.5px solid rgba(255,255,255,0.1);
      color:#fff;transition:border-color 0.2s;
    }
    .input-field:focus { border-color:rgba(139,92,246,0.6); }
    .input-label { display:block;font-size:12px;font-weight:700;color:rgba(255,255,255,0.45);margin-bottom:7px;letter-spacing:0.5px;text-transform:uppercase; }

    input[type="date"]::-webkit-calendar-picker-indicator,
    input[type="time"]::-webkit-calendar-picker-indicator { filter:invert(1);opacity:0.4; }
    input[type="date"], input[type="time"] { color-scheme:dark; }

    /* OTP input digits */
    .otp-input { width:48px;height:56px;text-align:center;font-size:24px;font-weight:800;border-radius:14px; }

    /* Toast */
    .toast {
      position:fixed;bottom:100px;left:50%;transform:translateX(-50%);
      background:rgba(30,30,40,0.95);backdrop-filter:blur(20px);
      border:1px solid rgba(255,255,255,0.12);border-radius:14px;
      padding:12px 20px;font-size:14px;font-weight:600;
      z-index:9999;white-space:nowrap;animation:toastIn 0.3s ease-out;
    }
  </style>
</head>
<body>

<!-- Required for Firebase Phone Auth reCAPTCHA -->
<div id="recaptcha-container" style="position:fixed;bottom:0;left:0;z-index:9999;"></div>
<style>.grecaptcha-badge { visibility: hidden !important; }</style>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useCallback } = React;

/* ═══════════════════════════════════════════════════════════
   🔥 FIREBASE CONFIGURATION
   ───────────────────────────────────────────────────────────
   1. Go to https://console.firebase.google.com
   2. Create a project → Add a web app
   3. Copy the config object and paste it below
   4. In Firebase Console, enable:
      • Authentication → Phone (turn on)
      • Firestore Database → Create in production mode
      • Storage → Get started
   ═══════════════════════════════════════════════════════════ */
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyC6-PmkYxy2PqOhufuNU9KEDVXXIKcRpxw",
  authDomain:        "connects-ca829.firebaseapp.com",
  projectId:         "connects-ca829",
  storageBucket:     "connects-ca829.firebasestorage.app",
  messagingSenderId: "388133096891",
  appId:             "1:388133096891:web:4b5d084dc9f18056c0c89e",
};

const IS_CONFIGURED = FIREBASE_CONFIG.apiKey !== "REPLACE_WITH_YOUR_API_KEY";

/* ── Firebase services ── */
let auth, db, storage;
if (IS_CONFIGURED) {
  firebase.initializeApp(FIREBASE_CONFIG);
  auth    = firebase.auth();
  db      = firebase.firestore();
  storage = firebase.storage();
}

/* ═══════════════════════════════════════════════════════════
   FIREBASE SERVICE HELPERS
   ═══════════════════════════════════════════════════════════ */

/* ── Auth ── */
const setupRecaptcha = async () => {
  if (!window._recaptchaVerifier) {
    window._recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', {
      size: 'invisible',
      callback: () => {},
    });
  }
  // Render (no-op if already rendered) then reset so it's fresh for next use
  try {
    const widgetId = await window._recaptchaVerifier.render();
    if (typeof grecaptcha !== 'undefined') grecaptcha.reset(widgetId);
  } catch(e) { /* already rendered — proceed */ }
};

const sendOTP = async (phone) => {
  await setupRecaptcha();
  const result = await auth.signInWithPhoneNumber(phone, window._recaptchaVerifier);
  window._confirmationResult = result;
};

const verifyOTP = async (code) => {
  const result = await window._confirmationResult.confirm(code);
  return result.user;
};

/* ── File Upload ── */
const uploadFile = async (path, file, onProgress) => {
  const ref = storage.ref(path);
  const task = ref.put(file);
  if (onProgress) task.on('state_changed', snap => onProgress(snap.bytesTransferred / snap.totalBytes * 100));
  await task;
  return ref.getDownloadURL();
};

/* ── Users ── */
const getUser = async (uid) => {
  const doc = await db.collection('users').doc(uid).get();
  return doc.exists ? { id: doc.id, ...doc.data() } : null;
};

const saveUser = async (uid, data) => {
  await db.collection('users').doc(uid).set(data, { merge: true });
};

const watchUser = (uid, cb) =>
  db.collection('users').doc(uid).onSnapshot(doc =>
    cb(doc.exists ? { id: doc.id, ...doc.data() } : null)
  );

/* ── Follows ── */
const followUser = async (myUid, theirUid) => {
  const batch = db.batch();
  batch.set(db.collection('users').doc(myUid).collection('following').doc(theirUid), { followedAt: firebase.firestore.FieldValue.serverTimestamp() });
  batch.update(db.collection('users').doc(myUid), { following: firebase.firestore.FieldValue.increment(1) });
  batch.update(db.collection('users').doc(theirUid), { followers: firebase.firestore.FieldValue.increment(1) });
  await batch.commit();
};

const unfollowUser = async (myUid, theirUid) => {
  const batch = db.batch();
  batch.delete(db.collection('users').doc(myUid).collection('following').doc(theirUid));
  batch.update(db.collection('users').doc(myUid), { following: firebase.firestore.FieldValue.increment(-1) });
  batch.update(db.collection('users').doc(theirUid), { followers: firebase.firestore.FieldValue.increment(-1) });
  await batch.commit();
};

const getFollowing = async (myUid) => {
  const snap = await db.collection('users').doc(myUid).collection('following').get();
  return new Set(snap.docs.map(d => d.id));
};

const getMutuals = async (myUid, theirUid) => {
  const [mine, theirs] = await Promise.all([getFollowing(myUid), getFollowing(theirUid)]);
  const mutualIds = [...mine].filter(id => theirs.has(id) && id !== theirUid && id !== myUid);
  const profiles = await Promise.all(mutualIds.slice(0, 8).map(getUser));
  return profiles.filter(Boolean);
};

/* ── Events ── */
const getEvents = async () => {
  const snap = await db.collection('events').orderBy('createdAt', 'desc').get();
  return snap.docs.map(d => ({ id: d.id, ...d.data() }));
};

const createEvent = async (data) => {
  const ref = await db.collection('events').add({ ...data, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
  return ref.id;
};

const updateEvent = async (id, data) => db.collection('events').doc(id).update(data);

const checkIn = async (eventId, uid) => {
  await db.collection('events').doc(eventId).collection('attendees').doc(uid).set({
    checkedIn: true, checkedInAt: firebase.firestore.FieldValue.serverTimestamp(),
  });
  await db.collection('events').doc(eventId).update({ checkedInCount: firebase.firestore.FieldValue.increment(1) });
  // Track attended events on user profile for shared-event lookups
  await db.collection('users').doc(uid).update({
    attendedEventIds: firebase.firestore.FieldValue.arrayUnion(eventId),
  });
};

const getAttendees = async (eventId) => {
  const snap = await db.collection('events').doc(eventId).collection('attendees').get();
  const uids = snap.docs.map(d => d.id);
  if (!uids.length) return [];
  const profiles = await Promise.all(uids.map(getUser));
  return profiles.filter(Boolean);
};

/* ── Feed ── */
const watchFeed = (eventId, cb) =>
  db.collection('events').doc(eventId).collection('posts')
    .orderBy('createdAt', 'desc').limit(30)
    .onSnapshot(snap => cb(snap.docs.map(d => ({ id: d.id, ...d.data() }))));

const addPost = async (eventId, data) => {
  await db.collection('events').doc(eventId).collection('posts').add({
    ...data, createdAt: firebase.firestore.FieldValue.serverTimestamp(),
  });
};

const toggleLike = async (eventId, postId, uid, liked) => {
  const ref = db.collection('events').doc(eventId).collection('posts').doc(postId);
  await ref.update({
    likes: liked
      ? firebase.firestore.FieldValue.arrayRemove(uid)
      : firebase.firestore.FieldValue.arrayUnion(uid),
  });
};

/* ── Stories ── */
const watchStories = (eventId, cb) =>
  db.collection('events').doc(eventId).collection('stories')
    .orderBy('createdAt', 'desc').limit(200)
    .onSnapshot(snap => {
      const now = Date.now();
      const stories = snap.docs
        .map(d => ({ id: d.id, ...d.data() }))
        .filter(s => s.createdAt && (now - s.createdAt.toMillis()) < 24 * 60 * 60 * 1000);
      cb(stories);
    });

const addStory = async (eventId, data) => {
  await db.collection('events').doc(eventId).collection('stories').add({
    ...data, createdAt: firebase.firestore.FieldValue.serverTimestamp(),
  });
};

/* ── Guest / RSVP ── */
const requestToAttend = async (eventId, uid, userData) => {
  await db.collection('events').doc(eventId).collection('guests').doc(uid).set({
    ...userData, status:'pending', requestedAt: firebase.firestore.FieldValue.serverTimestamp(),
  });
};

const watchGuests = (eventId, cb) =>
  db.collection('events').doc(eventId).collection('guests')
    .onSnapshot(snap => cb(snap.docs.map(d => ({ id:d.id, ...d.data() }))));

const updateGuestStatus = async (eventId, uid, status) => {
  await db.collection('events').doc(eventId).collection('guests').doc(uid).update({
    status, updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
  });
};

const getMyGuestStatus = async (eventId, uid) => {
  const doc = await db.collection('events').doc(eventId).collection('guests').doc(uid).get();
  return doc.exists ? doc.data().status : null;
};

/* ── DMs ── */
const dmId = (a, b) => [a, b].sort().join('__');

const watchDMMessages = (id, cb) =>
  db.collection('dms').doc(id).collection('messages')
    .orderBy('createdAt', 'asc').limit(100)
    .onSnapshot(snap => cb(snap.docs.map(d => ({ id: d.id, ...d.data() }))));

const sendMessage = async (id, senderId, text) => {
  await db.collection('dms').doc(id).collection('messages').add({
    senderId, text, createdAt: firebase.firestore.FieldValue.serverTimestamp(),
  });
  await db.collection('dms').doc(id).set({
    participants: id.split('__'),
    lastMessage: text,
    lastAt: firebase.firestore.FieldValue.serverTimestamp(),
  }, { merge: true });
};

const watchUserDMs = (uid, cb) =>
  db.collection('dms')
    .where('participants', 'array-contains', uid)
    .orderBy('lastAt', 'desc').limit(20)
    .onSnapshot(snap => cb(snap.docs.map(d => ({ id: d.id, ...d.data() }))));

/* ═══════════════════════════════════════════════════════════
   UTILITIES
   ═══════════════════════════════════════════════════════════ */
const fmt = n => n >= 1000 ? (n / 1000).toFixed(1).replace('.0', '') + 'K' : String(n || 0);
const initials = name => name ? name.trim().split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase() : '??';
const COLORS = ['#8B5CF6','#EC4899','#10B981','#F59E0B','#3B82F6','#EF4444','#14B8A6','#F97316'];
const colorFor = uid => COLORS[(uid?.charCodeAt(0) || 0) % COLORS.length];

/* ═══════════════════════════════════════════════════════════
   TOAST
   ═══════════════════════════════════════════════════════════ */
const ToastCtx = React.createContext(null);
const ToastProvider = ({ children }) => {
  const [toast, setToast] = useState(null);
  const show = useCallback((msg, type = 'info') => {
    setToast({ msg, type });
    setTimeout(() => setToast(null), 3000);
  }, []);
  const icons = { info:'ℹ️', success:'✅', error:'❌' };
  return (
    <ToastCtx.Provider value={show}>
      {children}
      {toast && (
        <div className="toast" style={{ color: toast.type==='error'?'#FCA5A5':toast.type==='success'?'#6EE7B7':'#fff' }}>
          {icons[toast.type]} {toast.msg}
        </div>
      )}
    </ToastCtx.Provider>
  );
};
const useToast = () => React.useContext(ToastCtx);

/* ═══════════════════════════════════════════════════════════
   UI PRIMITIVES
   ═══════════════════════════════════════════════════════════ */
const Spinner = ({ size=24 }) => (
  <div style={{ width:size,height:size,borderRadius:'50%',border:`${size*0.12}px solid rgba(255,255,255,0.1)`,borderTopColor:'#8B5CF6',animation:'spin 0.8s linear infinite' }} />
);

const Avatar = ({ user, size=40, ring=false, online=false }) => {
  const bg = ring ? 'linear-gradient(135deg,#A78BFA,#EC4899)' : (user?.photoURL ? 'transparent' : colorFor(user?.id));
  return (
    <div style={{ position:'relative',flexShrink:0,width:size,height:size }}>
      <div style={{ width:size,height:size,borderRadius:'50%',background:bg,display:'flex',alignItems:'center',justifyContent:'center',overflow:'hidden',padding:ring?2.5:0 }}>
        {ring
          ? <div style={{ width:'100%',height:'100%',borderRadius:'50%',background:colorFor(user?.id),display:'flex',alignItems:'center',justifyContent:'center',overflow:'hidden' }}>
              {user?.photoURL ? <img src={user.photoURL} style={{width:'100%',height:'100%',objectFit:'cover'}} /> : <span style={{fontSize:size*0.34,fontWeight:800}}>{initials(user?.name)}</span>}
            </div>
          : user?.photoURL
            ? <img src={user.photoURL} style={{width:'100%',height:'100%',objectFit:'cover'}} />
            : <span style={{fontSize:size*0.36,fontWeight:800,color:'#fff'}}>{initials(user?.name)}</span>
        }
      </div>
      {online && <div style={{ position:'absolute',bottom:1,right:1,width:size*0.27,height:size*0.27,borderRadius:'50%',background:'#10B981',border:`${Math.max(2,size*0.06)}px solid #08080F` }} />}
    </div>
  );
};

const Chip = ({ label, bg='rgba(139,92,246,0.18)', color='#C4B5FD', onClick }) => (
  <span onClick={onClick} style={{ padding:'3px 11px',borderRadius:99,fontSize:11,fontWeight:700,background:bg,color,whiteSpace:'nowrap',cursor:onClick?'pointer':'default' }}>{label}</span>
);

const LiveBadge = () => (
  <div style={{ display:'flex',alignItems:'center',gap:6,background:'rgba(16,185,129,0.12)',border:'1px solid rgba(16,185,129,0.3)',borderRadius:99,padding:'4px 11px' }}>
    <div className="live-dot" />
    <span style={{ fontSize:11,fontWeight:800,color:'#10B981',letterSpacing:0.8 }}>LIVE</span>
  </div>
);

const SocialLink = ({ platform, handle }) => {
  if (!handle) return null;
  const clean = handle.replace('@','');
  const url = platform==='instagram' ? `https://instagram.com/${clean}` : `https://tiktok.com/@${clean}`;
  const icon = platform==='instagram' ? '📸' : '🎵';
  const color = platform==='instagram' ? '#E1306C' : '#000';
  const bg = platform==='instagram' ? 'rgba(225,48,108,0.12)' : 'rgba(255,255,255,0.08)';
  return (
    <a href={url} target="_blank" rel="noopener noreferrer" style={{ display:'flex',alignItems:'center',gap:7,background:bg,border:`1px solid ${platform==='instagram'?'rgba(225,48,108,0.25)':'rgba(255,255,255,0.1)'}`,borderRadius:99,padding:'7px 14px',textDecoration:'none',color:'#fff',fontSize:13,fontWeight:700 }}>
      <span>{icon}</span> @{clean}
    </a>
  );
};

/* ═══════════════════════════════════════════════════════════
   SETUP REQUIRED SCREEN
   ═══════════════════════════════════════════════════════════ */
const SetupScreen = () => (
  <div style={{ minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:28,textAlign:'center',background:'#08080F' }}>
    <div style={{ fontSize:52,marginBottom:16 }}>🔥</div>
    <h2 style={{ fontSize:26,fontWeight:900,marginBottom:12 }}>Firebase Setup Required</h2>
    <p style={{ color:'rgba(255,255,255,0.5)',fontSize:14,lineHeight:1.7,marginBottom:28,maxWidth:320 }}>
      Open this file in a code editor and replace the <code style={{color:'#A78BFA',background:'rgba(139,92,246,0.15)',padding:'2px 6px',borderRadius:6}}>FIREBASE_CONFIG</code> values at the top with your Firebase project credentials.
    </p>
    <div style={{ background:'rgba(255,255,255,0.04)',border:'1px solid rgba(255,255,255,0.1)',borderRadius:18,padding:20,textAlign:'left',width:'100%',maxWidth:340 }}>
      {[
        ['1', 'Go to', 'console.firebase.google.com'],
        ['2', 'Create a project', '→ Add a web app'],
        ['3', 'Enable Phone Auth', 'Authentication → Sign-in method'],
        ['4', 'Create Firestore DB', 'Firestore Database → Create'],
        ['5', 'Enable Storage', 'Storage → Get started'],
        ['6', 'Paste config', 'Replace values at top of file'],
      ].map(([n, a, b]) => (
        <div key={n} style={{ display:'flex',gap:12,marginBottom:12,alignItems:'flex-start' }}>
          <div style={{ width:24,height:24,borderRadius:'50%',background:'linear-gradient(135deg,#7C3AED,#C026D3)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:900,flexShrink:0,marginTop:1 }}>{n}</div>
          <div><span style={{ fontWeight:700,fontSize:14 }}>{a}</span> <span style={{ color:'rgba(255,255,255,0.45)',fontSize:13 }}>{b}</span></div>
        </div>
      ))}
    </div>
    <p style={{ marginTop:20,color:'rgba(255,255,255,0.3)',fontSize:12 }}>Then refresh this page and you're live ⚡</p>
  </div>
);

/* ═══════════════════════════════════════════════════════════
   AUTH — PHONE ENTRY
   ═══════════════════════════════════════════════════════════ */
const PhoneScreen = ({ onCodeSent }) => {
  const [phone, setPhone] = useState('');
  const [loading, setLoading] = useState(false);
  const toast = useToast();

  const submit = async () => {
    const cleaned = phone.replace(/\D/g,'');
    if (cleaned.length < 10) return toast('Enter a valid phone number', 'error');
    const formatted = '+1' + cleaned.slice(-10);
    setLoading(true);
    try {
      await sendOTP(formatted);
      onCodeSent(formatted);
    } catch(e) {
      toast(e.message || 'Failed to send code', 'error');
      window._recaptchaVerifier = null;
    } finally { setLoading(false); }
  };

  const formatDisplay = (v) => {
    const d = v.replace(/\D/g,'').slice(0,10);
    if (d.length <= 3) return d;
    if (d.length <= 6) return `(${d.slice(0,3)}) ${d.slice(3)}`;
    return `(${d.slice(0,3)}) ${d.slice(3,6)}-${d.slice(6)}`;
  };

  return (
    <div style={{ minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'40px 28px',background:'#08080F',position:'relative',overflow:'hidden' }}>
      <div style={{ position:'absolute',top:'10%',left:'-10%',width:300,height:300,borderRadius:'50%',background:'radial-gradient(circle,rgba(109,40,217,0.25) 0%,transparent 70%)',filter:'blur(40px)',pointerEvents:'none' }}/>
      <div style={{ position:'absolute',bottom:'10%',right:'-10%',width:280,height:280,borderRadius:'50%',background:'radial-gradient(circle,rgba(236,72,153,0.2) 0%,transparent 70%)',filter:'blur(40px)',pointerEvents:'none' }}/>

      <div style={{ textAlign:'center',marginBottom:48,zIndex:1 }} className="animate-in">
        <div style={{ fontSize:52,marginBottom:12,filter:'drop-shadow(0 0 20px rgba(139,92,246,0.6))' }}>⚡</div>
        <h1 className="gradient-text" style={{ fontSize:46,fontWeight:900,letterSpacing:-2,margin:'0 0 10px' }}>connects</h1>
        <p style={{ color:'rgba(255,255,255,0.45)',fontSize:16 }}>Find your people at every event</p>
      </div>

      <div style={{ width:'100%',maxWidth:320,zIndex:1 }}>
        <label className="input-label">Your phone number</label>
        <div style={{ display:'flex',gap:10,marginBottom:20 }}>

/* ═══════════════════════════════════════════════════════════
   AUTH — OTP VERIFY
   ═══════════════════════════════════════════════════════════ */
const OTPScreen = ({ phone, onVerified, onBack }) => {
  const [digits, setDigits] = useState(['','','','','','']);
  const [loading, setLoading] = useState(false);
  const refs = Array.from({length:6},()=>useRef(null));
  const toast = useToast();

  const handleDigit = (i, v) => {
    if (!/^\d*$/.test(v)) return;
    const d = [...digits];
    d[i] = v.slice(-1);
    setDigits(d);
    if (v && i < 5) refs[i+1].current?.focus();
    if (d.every(x=>x)) verify(d.join(''));
  };

  const handleKey = (i, e) => {
    if (e.key==='Backspace' && !digits[i] && i>0) refs[i-1].current?.focus();
  };

  const handlePaste = (e) => {
    const text = e.clipboardData.getData('text').replace(/\D/g,'').slice(0,6);
    if (text.length===6) {
      setDigits(text.split(''));
      verify(text);
    }
  };

  const verify = async (code) => {
    setLoading(true);
    try {
      const user = await verifyOTP(code);
      onVerified(user);
    } catch(e) {
      toast('Incorrect code — try again', 'error');
      setDigits(['','','','','','']);
      refs[0].current?.focus();
    } finally { setLoading(false); }
  };

  return (
    <div style={{ minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'40px 28px',background:'#08080F' }}>
      <div style={{ width:'100%',maxWidth:320 }}>
        <button onClick={onBack} style={{ background:'rgba(255,255,255,0.08)',borderRadius:'50%',width:38,height:38,color:'#fff',fontSize:17,display:'flex',alignItems:'center',justifyContent:'center',marginBottom:32 }}>←</button>
        <h2 style={{ fontSize:28,fontWeight:900,marginBottom:8,letterSpacing:-0.5 }}>Check your texts 📱</h2>
        <p style={{ color:'rgba(255,255,255,0.45)',fontSize:15,marginBottom:36,lineHeight:1.6 }}>
          We sent a 6-digit code to<br/><span style={{ color:'#A78BFA',fontWeight:700 }}>{phone}</span>
        </p>

        <div style={{ display:'flex',gap:10,marginBottom:28,justifyContent:'center' }} onPaste={handlePaste}>
          {digits.map((d,i)=>(
            <input
              key={i} ref={refs[i]}
              className="input-field otp-input"
              value={d}
              onChange={e=>handleDigit(i,e.target.value)}
              onKeyDown={e=>handleKey(i,e)}
              inputMode="numeric"
              maxLength={1}
              style={{ padding:0 }}
            />
          ))}
        </div>

        {loading && (
          <div style={{ display:'flex',justifyContent:'center',marginBottom:20 }}>
            <Spinner size={28} />
          </div>
        )}

        <p style={{ textAlign:'center',color:'rgba(255,255,255,0.35)',fontSize:13 }}>
          Didn't get it?{' '}
          <span style={{ color:'#A78BFA',fontWeight:700,cursor:'pointer' }} onClick={()=>{ setDigits(['','','','','','']); onBack(); }}>
            Resend
          </span>
        </p>
      </div>
    </div>
  );
};

const StoryViewer = ({ stories, startIndex, currentUser, onClose }) => {
  const [idx, setIdx] = useState(startIndex || 0);
  const [progress, setProgress] = useState(0);
  const timerRef = useRef(null);
  const DURATION = 5000;

  const story = stories[idx];

  const goNext = useCallback(() => {
    if (idx < stories.length - 1) { setIdx(i => i + 1); setProgress(0); }
    else onClose();
  }, [idx, stories.length, onClose]);

  const goPrev = () => {
    if (idx > 0) { setIdx(i => i - 1); setProgress(0); }
  };

  useEffect(() => {
    setProgress(0);
    const start = Date.now();
    const tick = () => {
      const elapsed = Date.now() - start;
      const pct = Math.min((elapsed / DURATION) * 100, 100);
      setProgress(pct);
      if (pct < 100) timerRef.current = requestAnimationFrame(tick);
      else goNext();
    };
    timerRef.current = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(timerRef.current);
  }, [idx, goNext]);

  const timeAgo = (ts) => {
    if (!ts) return '';
    const secs = Math.floor((Date.now() - ts.toMillis()) / 1000);
    if (secs < 60) return `${secs}s ago`;
    if (secs < 3600) return `${Math.floor(secs/60)}m ago`;
    return `${Math.floor(secs/3600)}h ago`;
  };

  if (!story) return null;

  return (
    <div style={{ position:'fixed',inset:0,zIndex:200,background:'#000',display:'flex',flexDirection:'column' }}
      onClick={e => {
        const x = e.clientX / window.innerWidth;
        if (x < 0.35) goPrev(); else goNext();
      }}
    >
      {/* Progress bars */}
      <div style={{ position:'absolute',top:0,left:0,right:0,padding:'12px 10px 0',display:'flex',gap:4,zIndex:10 }}>
        {stories.map((_, i) => (
          <div key={i} style={{ flex:1,height:3,borderRadius:99,background:'rgba(255,255,255,0.25)',overflow:'hidden' }}>
            <div style={{ height:'100%',background:'#fff',width: i < idx ? '100%' : i === idx ? `${progress}%` : '0%',transition: i===idx ? 'none' : undefined, borderRadius:99 }}/>
          </div>
        ))}
      </div>

      {/* Story image */}
      <img src={story.imageURL} style={{ position:'absolute',inset:0,width:'100%',height:'100%',objectFit:'cover' }} alt="story"/>
      <div style={{ position:'absolute',inset:0,background:'linear-gradient(to bottom,rgba(0,0,0,0.35) 0%,transparent 30%,transparent 65%,rgba(0,0,0,0.6) 100%)' }}/>

      {/* Header */}
      <div style={{ position:'absolute',top:0,left:0,right:0,padding:'48px 16px 0',display:'flex',alignItems:'center',gap:10,zIndex:10 }}>
        <div style={{ display:'flex',alignItems:'center',gap:10,flex:1 }}>
          <Avatar user={{ id:story.userId, name:story.userName, photoURL:story.userPhoto }} size={36} ring/>
          <div>
            <div style={{ fontWeight:800,fontSize:14,color:'#fff' }}>{story.userName}</div>
            <div style={{ fontSize:11,color:'rgba(255,255,255,0.6)' }}>{timeAgo(story.createdAt)}</div>
          </div>
        </div>
        <button onClick={e=>{e.stopPropagation();onClose();}} style={{ background:'rgba(0,0,0,0.4)',border:'none',borderRadius:'50%',width:34,height:34,color:'#fff',fontSize:16,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center' }}>✕</button>
      </div>

      {/* Caption */}
      {story.caption && (
        <div style={{ position:'absolute',bottom:48,left:16,right:16,zIndex:10 }}>
          <p style={{ fontSize:15,fontWeight:600,color:'#fff',textShadow:'0 1px 6px rgba(0,0,0,0.7)',lineHeight:1.5 }}>{story.caption}</p>
        </div>
      )}
    </div>
  );
};

  const seen = new Set();
  [...stories].reverse().forEach(s => {
    if (!seen.has(s.userId)) {
      seen.add(s.userId);
      byUser.push({ userId: s.userId, userName: s.userName, userPhoto: s.userPhoto, stories: stories.filter(x => x.userId === s.userId) });
    }
  });
  // Current user's group first
  byUser.sort((a,b) => a.userId===currentUser?.id ? -1 : b.userId===currentUser?.id ? 1 : 0);

  const handleAddStory = async (e) => {
    const file = e.target.files[0];
    if (!file || !currentUser?.id) return;
    setUploading(true);
    try {
      const imageURL = await uploadFile(`stories/${eventId}/${currentUser.id}_${Date.now()}.jpg`, file);
      await addStory(eventId, {
        userId: currentUser.id,
        userName: currentUser.name,
        userPhoto: currentUser.photoURL || null,
        imageURL,
        caption: '',
      });
      toast('Story added! 🎉', 'success');
    } catch(err) {
      toast('Failed to upload story', 'error');
    } finally {
      setUploading(false);
      e.target.value = '';
    }
  };

  const myGroup = byUser.find(g => g.userId === currentUser?.id);

  return (
    <>
      {viewing && (
        <StoryViewer
          stories={viewing.stories}
          startIndex={viewing.startIndex}
          currentUser={currentUser}
          onClose={() => setViewing(null)}
        />
      )}
      <input ref={addRef} type="file" accept="image/*" style={{ display:'none' }} onChange={handleAddStory}/>

      <div style={{ display:'flex',gap:14,overflowX:'auto',padding:'4px 0 12px',marginBottom:6 }}>
        {/* Add your story button */}
        <div style={{ display:'flex',flexDirection:'column',alignItems:'center',gap:6,flexShrink:0,cursor:'pointer' }}
          onClick={() => myGroup ? setViewing({ stories: myGroup.stories, startIndex: 0 }) : addRef.current.click()}
        >
          <div style={{ position:'relative',width:60,height:60 }}>
            {myGroup
              ? <Avatar user={currentUser} size={60} ring/>
              : <div style={{ width:60,height:60,borderRadius:'50%',background:'rgba(255,255,255,0.07)',border:'2px dashed rgba(139,92,246,0.5)',display:'flex',alignItems:'center',justifyContent:'center' }}>
                  {uploading ? <Spinner size={22}/> : <span style={{ fontSize:22,lineHeight:1 }}>+</span>}
                </div>
            }
            {myGroup && (
              <button
                onClick={e=>{e.stopPropagation();addRef.current.click();}}
                style={{ position:'absolute',bottom:-2,right:-2,width:22,height:22,borderRadius:'50%',background:'linear-gradient(135deg,#7C3AED,#C026D3)',border:'2px solid #08080F',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,cursor:'pointer' }}>
                +
              </button>
            )}
          </div>
          <span style={{ fontSize:11,color:'rgba(255,255,255,0.5)',fontWeight:600,maxWidth:60,textAlign:'center',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap' }}>
            {myGroup ? 'Your story' : 'Add story'}
          </span>
        </div>

        {/* Other users' stories */}
        {byUser.filter(g => g.userId !== currentUser?.id).map(group => (
          <div key={group.userId} style={{ display:'flex',flexDirection:'column',alignItems:'center',gap:6,flexShrink:0,cursor:'pointer' }}
            onClick={() => setViewing({ stories: group.stories, startIndex: 0 })}
          >
            <Avatar user={{ id:group.userId, name:group.userName, photoURL:group.userPhoto }} size={60} ring/>
            <span style={{ fontSize:11,color:'rgba(255,255,255,0.5)',fontWeight:600,maxWidth:60,textAlign:'center',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap' }}>
              {group.userName?.split(' ')[0]}
            </span>
          </div>
        ))}
      </div>
    </>
  );
};

const EventScreen = ({ event, currentUser, onBack, onDm, onViewProfile }) => {
  const [tab, setTab]                     = useState('feed');
  const [feed, setFeed]                   = useState([]);
  const [attendees, setAttendees]         = useState([]);
  const [postText, setPostText]           = useState('');
  const [postPhotoFile, setPostPhotoFile] = useState(null);
  const [postPhotoPreview, setPostPhotoPreview] = useState(null);
  const [postLoading, setPostLoading]     = useState(false);
  const [checkedIn, setCheckedIn]         = useState(false);
  const [guestStatus, setGuestStatus]     = useState(null);
  const [guests, setGuests]               = useState([]);
  const [announcementText, setAnnouncementText] = useState('');
  const [followed, setFollowed]           = useState({});
  const [followLoading, setFollowLoading] = useState({});
  const toast  = useToast();
  const postPhotoRef = useRef(null);

  const isHost    = event.hostId === currentUser?.id;
  const isPrivate = event.privacy === 'invite';
  const eventLink = `${window.location.origin}${window.location.pathname}?event=${event.id}`;

  const netRecs = attendees
    .filter(u=>u.id!==currentUser?.id)
    .map(u=>{
      let score=40, reason='Strong network match';
      if (u.industry&&currentUser?.industry) {
        if (u.industry===currentUser.industry) { score+=50; reason=`Both in ${currentUser.industry}`; }
        else { score+=20; reason=`${u.industry} × ${currentUser.industry||'your field'}`; }
      }
      if (u.followers>10000) score+=10;
      if (u.jobTitle?.toLowerCase().includes('partner')||u.jobTitle?.toLowerCase().includes('founder')) score+=8;
      return { user:u, score:Math.min(score,97), reason };
    }).sort((a,b)=>b.score-a.score).slice(0,4);

  useEffect(()=>{
    if (!event?.id) return;
    const unsub = watchFeed(event.id, setFeed);
    getAttendees(event.id).then(setAttendees);
    if (currentUser?.id) {
      getFollowing(currentUser.id).then(followSet => {
        const map = {};
        followSet.forEach(uid => { map[uid] = true; });
        setFollowed(map);
      });
    }
    if (isPrivate && currentUser?.id && !isHost) {
      getMyGuestStatus(event.id, currentUser.id).then(setGuestStatus);
    }
    if (isHost) {
      const unsubG = watchGuests(event.id, setGuests);
      return ()=>{ unsub(); unsubG(); };
    }
    return ()=>unsub();
  },[event?.id]);

  const doCheckIn = async () => {
    if (checkedIn||!currentUser?.id) return;
    if (isPrivate && !isHost && guestStatus!=='approved') return;
    try {
      await checkIn(event.id, currentUser.id);
      await addPost(event.id, { userId:currentUser.id, userName:currentUser.name, userPhoto:currentUser.photoURL||null, type:'arrived', text:'Just checked in! 🎉', likes:[], userJob:currentUser.jobTitle||'' });
      setCheckedIn(true); setAttendees(a=>[...a,currentUser]);
      toast('Checked in! 🎉','success');
    } catch(e) { toast('Check-in failed','error'); }
  };

  const doRequestRSVP = async () => {
    if (!currentUser?.id) return;
    try {
      await requestToAttend(event.id, currentUser.id, {
        name:currentUser.name, jobTitle:currentUser.jobTitle||'', industry:currentUser.industry||'',
        instagram:currentUser.instagram||'', tiktok:currentUser.tiktok||'', photoURL:currentUser.photoURL||null,
      });
      setGuestStatus('pending'); toast('Request sent! The host will review it.','success');
    } catch(e) { toast('Failed to send request','error'); }
  };

  const doPost = async () => {
    if (!postText.trim()&&!postPhotoFile) return;
    if (!currentUser?.id) return;
    setPostLoading(true);
    try {
      let photoURL = null;
      if (postPhotoFile) photoURL = await uploadFile(`posts/${event.id}/${currentUser.id}_${Date.now()}.jpg`, postPhotoFile);
      await addPost(event.id, { userId:currentUser.id, userName:currentUser.name, userPhoto:currentUser.photoURL||null, type:'shoutout', text:postText.trim(), photoURL, likes:[], userJob:currentUser.jobTitle||'' });
      setPostText(''); setPostPhotoFile(null); setPostPhotoPreview(null);
    } catch(e) { toast('Failed to post','error'); }
    finally { setPostLoading(false); }
  };

  const doAnnouncement = async () => {
    if (!announcementText.trim()||!isHost) return;
    try {
      await addPost(event.id, { userId:currentUser.id, userName:currentUser.name, userPhoto:currentUser.photoURL||null, type:'announcement', text:announcementText.trim(), likes:[], userJob:'Host' });
      setAnnouncementText(''); toast('Announcement posted! 📢','success');
    } catch(e) { toast('Failed to post announcement','error'); }
  };

  const doLike = async (post) => {
    if (!currentUser?.id) return;
    const liked = post.likes?.includes(currentUser.id);
    await toggleLike(event.id, post.id, currentUser.id, liked);
  };

  const doUpdateGuest = async (uid, status) => {
    try {
      await updateGuestStatus(event.id, uid, status);
      const msg = status==='approved'?'Guest approved ✓':status==='waitlisted'?'Added to waitlist':'Request denied';
      toast(msg, status==='approved'?'success':'info');
    } catch(e) { toast('Failed to update','error'); }
  };

  const downloadGuestList = () => {
    const headers = ['Name','Job Title','Industry','Instagram','TikTok','Status'];
    const rows = guests.map(g=>[g.name||'',g.jobTitle||'',g.industry||'',g.instagram?`@${g.instagram}`:'',g.tiktok?`@${g.tiktok}`:'',g.status||'']);
    const csv = [headers,...rows].map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
    const blob = new Blob([csv],{type:'text/csv'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href=url; a.download=`${event.name.replace(/\s+/g,'-')}-guests.csv`; a.click();
    URL.revokeObjectURL(url);
  };

  const copyLink = () => navigator.clipboard.writeText(eventLink).then(()=>toast('Link copied! 🔗','success'));

  const tabs = [
    { id:'feed',     icon:'📡', label:'Feed'    },
    { id:'people',   icon:'👥', label:'People'  },
    { id:'connect',  icon:'⚡', label:'Connect' },
    { id:'messages', icon:'💬', label:'DMs'     },
    ...(isHost?[{ id:'manage', icon:'⚙️', label:'Manage' }]:[]),
  ];

  const pendingGuests    = guests.filter(g=>g.status==='pending');
  const approvedGuests   = guests.filter(g=>g.status==='approved');
  const waitlistedGuests = guests.filter(g=>g.status==='waitlisted');

  const renderCheckIn = () => {
    if (checkedIn) return (
      <div style={{ background:'rgba(16,185,129,0.14)',border:'1px solid rgba(16,185,129,0.28)',borderRadius:13,padding:'10px 14px',display:'flex',alignItems:'center',gap:10 }}>
        <span style={{ fontSize:16 }}>✅</span>
        <div><div style={{ fontSize:13,fontWeight:800,color:'#10B981' }}>You're checked in!</div><div style={{ fontSize:11,color:'rgba(255,255,255,0.45)' }}>Your connections can see you're here</div></div>
      </div>
    );
    if (!isPrivate||isHost) return <button onClick={doCheckIn} className="btn-primary" style={{ padding:'11px 22px',borderRadius:99,fontSize:14,border:'none' }}>Check In ✓</button>;
    if (guestStatus===null) return <button onClick={doRequestRSVP} className="btn-primary" style={{ padding:'11px 22px',borderRadius:99,fontSize:14,border:'none' }}>Request to Attend</button>;
    if (guestStatus==='pending') return (
      <div style={{ background:'rgba(245,158,11,0.12)',border:'1px solid rgba(245,158,11,0.3)',borderRadius:13,padding:'10px 14px',display:'flex',alignItems:'center',gap:10 }}>
        <span>⏳</span><div style={{ fontSize:13,fontWeight:700,color:'#FCD34D' }}>Request pending host approval</div>
      </div>
    );
    if (guestStatus==='waitlisted') return (
      <div style={{ background:'rgba(59,130,246,0.12)',border:'1px solid rgba(59,130,246,0.3)',borderRadius:13,padding:'10px 14px',display:'flex',alignItems:'center',gap:10 }}>
        <span>📋</span><div style={{ fontSize:13,fontWeight:700,color:'#93C5FD' }}>You're on the waitlist</div>
      </div>
    );
    if (guestStatus==='denied') return (
      <div style={{ background:'rgba(239,68,68,0.10)',border:'1px solid rgba(239,68,68,0.25)',borderRadius:13,padding:'10px 14px',display:'flex',alignItems:'center',gap:10 }}>
        <span>❌</span><div style={{ fontSize:13,fontWeight:700,color:'#FCA5A5' }}>Request not approved</div>
      </div>
    );
    if (guestStatus==='approved') return <button onClick={doCheckIn} className="btn-primary" style={{ padding:'11px 22px',borderRadius:99,fontSize:14,border:'none' }}>Check In ✓</button>;
    return null;
  };

  return (
    <div style={{ minHeight:'100vh',background:'#08080F' }}>
      <input ref={postPhotoRef} type="file" accept="image/*" style={{ display:'none' }} onChange={e=>{
        const f=e.target.files[0]; if(!f)return;
        setPostPhotoFile(f);
        const reader=new FileReader(); reader.onload=ev=>setPostPhotoPreview(ev.target.result); reader.readAsDataURL(f);
      }}/>

      {/* Event Header */}
      <div style={{ position:'relative',background:event.gradient||'linear-gradient(135deg,#3B0764,#9D174D)',padding:'52px 20px 22px',overflow:'hidden' }}>
        {event.flyerURL&&<div style={{ position:'absolute',inset:0 }}><img src={event.flyerURL} style={{ width:'100%',height:'100%',objectFit:'cover',opacity:0.4 }}/><div style={{ position:'absolute',inset:0,background:'linear-gradient(to bottom,rgba(0,0,0,0.3),rgba(0,0,0,0.75))' }}/></div>}
        {!event.flyerURL&&<div style={{ position:'absolute',inset:0,opacity:0.3,backgroundImage:'radial-gradient(rgba(255,255,255,0.07) 1px,transparent 1px)',backgroundSize:'20px 20px' }}/>}
        <div style={{ position:'absolute',bottom:0,left:0,right:0,height:'45%',background:'linear-gradient(to top,rgba(0,0,0,0.55),transparent)',pointerEvents:'none' }}/>
        <div style={{ position:'relative' }}>
          <div style={{ display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:18 }}>
            <button onClick={onBack} style={{ background:'rgba(0,0,0,0.35)',backdropFilter:'blur(12px)',border:'1px solid rgba(255,255,255,0.15)',borderRadius:'50%',width:40,height:40,color:'#fff',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',fontSize:17 }}>←</button>
            <div style={{ display:'flex',gap:8,alignItems:'center' }}>
              {event.isLive&&<LiveBadge/>}
              <button onClick={copyLink} style={{ background:'rgba(0,0,0,0.4)',backdropFilter:'blur(12px)',border:'1px solid rgba(255,255,255,0.2)',borderRadius:99,padding:'8px 14px',color:'#fff',fontSize:12,fontWeight:700,cursor:'pointer' }}>🔗 Share</button>
            </div>
          </div>
          <div style={{ fontSize:40,marginBottom:8 }}>{event.emoji||'🎭'}</div>
          <h1 style={{ fontSize:30,fontWeight:900,letterSpacing:-0.8,color:'#fff',marginBottom:8 }}>{event.name}</h1>
          <div style={{ fontSize:14,color:'rgba(255,255,255,0.8)',marginBottom:4 }}>📍 {event.location}</div>
          <div style={{ fontSize:13,color:'rgba(255,255,255,0.65)',marginBottom:10 }}>🕖 {event.timeRange||event.time}</div>
          <div style={{ display:'flex',alignItems:'center',gap:10,marginBottom:14,flexWrap:'wrap' }}>
            <span style={{ fontSize:13,fontWeight:700,color:'rgba(255,255,255,0.85)' }}>{event.checkedInCount||0} checked in</span>
            {isPrivate&&<Chip label="🔒 Private" bg="rgba(0,0,0,0.35)" color="rgba(255,255,255,0.7)"/>}
          </div>
          {renderCheckIn()}
        </div>
      </div>

      {/* Tab bar */}
      <div style={{ display:'flex',background:'rgba(8,8,15,0.95)',borderBottom:'1px solid rgba(255,255,255,0.06)',position:'sticky',top:0,zIndex:20,backdropFilter:'blur(20px)' }}>
        {tabs.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{ flex:1,padding:'13px 4px 11px',background:'none',border:'none',color:tab===t.id?'#fff':'rgba(255,255,255,0.38)',fontSize:10,fontWeight:tab===t.id?800:500,cursor:'pointer',borderBottom:tab===t.id?'2.5px solid #8B5CF6':'2.5px solid transparent',display:'flex',flexDirection:'column',alignItems:'center',gap:3 }}>
            <span style={{ fontSize:15 }}>{t.icon}</span>{t.label}
          </button>
        ))}
      </div>

      <div style={{ padding:'16px 16px 0' }}>

        {/* ── FEED ── */}
        {tab==='feed' && (
          <div className="animate-in">
            <StoryRow eventId={event.id} currentUser={currentUser}/>

            {/* Announcements pinned at top */}
            {feed.filter(p=>p.type==='announcement').map(item=>(
              <div key={item.id} style={{ marginBottom:12,background:'linear-gradient(135deg,rgba(124,58,237,0.2),rgba(192,38,211,0.14))',border:'1px solid rgba(139,92,246,0.4)',borderRadius:18,padding:'14px 16px' }}>
                <div style={{ display:'flex',alignItems:'center',gap:8,marginBottom:8 }}>
                  <span style={{ fontSize:18 }}>📢</span>
                  <span style={{ fontWeight:800,fontSize:13,color:'#A78BFA' }}>Host Announcement</span>
                </div>
                <p style={{ fontSize:15,fontWeight:600,color:'#fff',lineHeight:1.55,margin:0 }}>{item.text}</p>
              </div>
            ))}

            {/* Post composer */}
            <div style={{ background:'rgba(255,255,255,0.04)',border:'1px solid rgba(255,255,255,0.08)',borderRadius:16,padding:'12px 14px',marginBottom:14 }}>
              {postPhotoPreview&&(
                <div style={{ position:'relative',marginBottom:10 }}>
                  <img src={postPhotoPreview} style={{ width:'100%',maxHeight:200,objectFit:'cover',borderRadius:12 }}/>
                  <button onClick={()=>{setPostPhotoFile(null);setPostPhotoPreview(null);}} style={{ position:'absolute',top:8,right:8,background:'rgba(0,0,0,0.6)',border:'none',borderRadius:'50%',width:28,height:28,color:'#fff',fontSize:14,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center' }}>✕</button>
                </div>
              )}
              <div style={{ display:'flex',gap:10,alignItems:'center' }}>
                <Avatar user={currentUser} size={36}/>
                <input value={postText} onChange={e=>setPostText(e.target.value)} onKeyDown={e=>e.key==='Enter'&&!e.shiftKey&&doPost()} placeholder="Share a shoutout to the room..." style={{ flex:1,background:'none',border:'none',color:'#fff',fontSize:14,padding:0 }}/>
                <button onClick={()=>postPhotoRef.current.click()} style={{ background:'none',border:'none',fontSize:20,cursor:'pointer',opacity:0.55,padding:'2px',flexShrink:0 }}>📷</button>
                {(postText.trim()||postPhotoFile)&&(
                  <button onClick={doPost} disabled={postLoading} style={{ background:'linear-gradient(135deg,#7C3AED,#C026D3)',border:'none',borderRadius:99,padding:'7px 15px',color:'#fff',fontSize:12,fontWeight:800,cursor:'pointer',flexShrink:0,display:'flex',alignItems:'center',gap:6 }}>
                    {postLoading?<Spinner size={14}/>:'Post'}
                  </button>
                )}
              </div>
            </div>

            {feed.filter(p=>p.type!=='announcement').length===0&&<div style={{ textAlign:'center',padding:'40px 0',color:'rgba(255,255,255,0.3)',fontSize:14 }}>No posts yet — be the first!</div>}
            {feed.filter(p=>p.type!=='announcement').map(item=>{
              const liked=item.likes?.includes(currentUser?.id);
              return (
                <div key={item.id} style={{ marginBottom:11,background:'rgba(255,255,255,0.03)',border:'1px solid rgba(255,255,255,0.06)',borderRadius:18,overflow:'hidden' }}>
                  {item.photoURL&&<img src={item.photoURL} style={{ width:'100%',maxHeight:300,objectFit:'cover',display:'block' }}/>}
                  <div style={{ padding:'12px 14px' }}>
                    <div style={{ display:'flex',alignItems:'center',gap:10,marginBottom:8 }}>
                      <div onClick={()=>item.userId!==currentUser?.id&&onViewProfile&&onViewProfile(item.userId)} style={{ cursor:item.userId!==currentUser?.id?'pointer':'default' }}>
                        <Avatar user={{ id:item.userId,name:item.userName,photoURL:item.userPhoto }} size={36} online/>
                      </div>
                      <div onClick={()=>item.userId!==currentUser?.id&&onViewProfile&&onViewProfile(item.userId)} style={{ flex:1,minWidth:0,cursor:item.userId!==currentUser?.id?'pointer':'default' }}>
                        <div style={{ display:'flex',alignItems:'center',gap:7,marginBottom:1 }}>
                          <span style={{ fontWeight:800,fontSize:14 }}>{item.userName}</span>
                          {item.type==='arrived'&&<Chip label="arrived ✓" bg="rgba(16,185,129,0.14)" color="#34D399"/>}
                        </div>
                        <div style={{ fontSize:12,color:'rgba(255,255,255,0.38)' }}>{item.userJob}</div>
                      </div>
                      <button onClick={()=>onDm({id:item.userId,name:item.userName,photoURL:item.userPhoto,jobTitle:item.userJob})} style={{ background:'rgba(255,255,255,0.07)',border:'none',borderRadius:99,padding:'6px 12px',color:'rgba(255,255,255,0.6)',fontSize:12,fontWeight:600,cursor:'pointer' }}>💬 DM</button>
                    </div>
                    {item.text&&<p style={{ margin:'0 0 10px',fontSize:14,color:'rgba(255,255,255,0.82)',lineHeight:1.55 }}>{item.text}</p>}
                    <button onClick={()=>doLike(item)} style={{ background:'none',border:'none',display:'flex',alignItems:'center',gap:5,color:liked?'#EC4899':'rgba(255,255,255,0.38)',fontSize:13,fontWeight:700,cursor:'pointer',padding:0 }}>
                      {liked?'❤️':'🤍'} {item.likes?.length||0}
                    </button>
                  </div>
                </div>
              );
            })}
          </div>
        )}

        {/* ── PEOPLE ── */}
        {tab==='people' && (
          <div className="animate-in">
            <div style={{ fontSize:13,color:'rgba(255,255,255,0.38)',marginBottom:16,fontWeight:600 }}>{attendees.length} checked in</div>
            {attendees.map(u=>(
              <div key={u.id} onClick={()=>u.id!==currentUser?.id&&onViewProfile&&onViewProfile(u.id)} className="card-press" style={{ marginBottom:10,background:'rgba(255,255,255,0.03)',border:'1px solid rgba(255,255,255,0.06)',borderRadius:17,padding:'13px 14px',display:'flex',alignItems:'center',gap:13,cursor:u.id!==currentUser?.id?'pointer':'default' }}>
                <Avatar user={u} size={48} online/>
                <div style={{ flex:1,minWidth:0 }}>
                  <div style={{ fontWeight:800,fontSize:15,marginBottom:2 }}>{u.name}{u.id===currentUser?.id&&<span style={{ marginLeft:7,fontSize:11,color:'#A78BFA',fontWeight:700 }}>You</span>}</div>
                  <div style={{ fontSize:12,color:'rgba(255,255,255,0.5)',marginBottom:4 }}>{u.jobTitle}</div>
                  <div style={{ display:'flex',gap:6,flexWrap:'wrap' }}>
                    {u.instagram&&<Chip label={`📸 @${u.instagram}`} bg="rgba(225,48,108,0.12)" color="#F9A8D4"/>}
                    {u.tiktok&&<Chip label={`🎵 @${u.tiktok}`} bg="rgba(255,255,255,0.06)" color="rgba(255,255,255,0.6)"/>}
                  </div>
                </div>
                {u.id!==currentUser?.id&&<button onClick={e=>{e.stopPropagation();onDm(u);}} style={{ background:'rgba(255,255,255,0.08)',border:'1px solid rgba(255,255,255,0.1)',borderRadius:99,padding:'8px 14px',color:'#fff',fontSize:13,fontWeight:700,cursor:'pointer',flexShrink:0,whiteSpace:'nowrap' }}>👋 Hi</button>}
              </div>
            ))}
            {attendees.length===0&&<div style={{ textAlign:'center',padding:'40px 0',color:'rgba(255,255,255,0.3)',fontSize:14 }}>No one checked in yet. Be first!</div>}

        {/* ── CONNECT ── */}
        {tab==='connect' && (

            {/* Pending requests */}
            {pendingGuests.length>0&&(

                <h4 style={{ fontSize:14,fontWeight:800,color:'#FCD34D',marginBottom:10 }}>⏳ Pending Requests ({pendingGuests.length})</h4>
                {pendingGuests.map(g=>(
                  <div key={g.id} style={{ background:'rgba(255,255,255,0.03)',border:'1px solid rgba(255,255,255,0.07)',borderRadius:16,padding:'12px 14px',marginBottom:10 }}>

                        <div style={{ fontWeight:800,fontSize:15 }}>{g.name}</div>
                        <div style={{ fontSize:12,color:'rgba(255,255,255,0.45)' }}>{g.jobTitle}{g.jobTitle&&g.industry?' · ':''}{g.industry}</div>
                      </div>
                    </div>
                    <div style={{ display:'flex',gap:8 }}>
                      <button onClick={()=>doUpdateGuest(g.id,'approved')} style={{ flex:1,padding:'9px',borderRadius:10,background:'rgba(16,185,129,0.18)',border:'1px solid rgba(16,185,129,0.35)',color:'#10B981',fontSize:13,fontWeight:700,cursor:'pointer' }}>✓ Approve</button>
                      <button onClick={()=>doUpdateGuest(g.id,'waitlisted')} style={{ flex:1,padding:'9px',borderRadius:10,background:'rgba(59,130,246,0.14)',border:'1px solid rgba(59,130,246,0.3)',color:'#93C5FD',fontSize:13,fontWeight:700,cursor:'pointer' }}>📋 Waitlist</button>
                      <button onClick={()=>doUpdateGuest(g.id,'denied')} style={{ flex:1,padding:'9px',borderRadius:10,background:'rgba(239,68,68,0.12)',border:'1px solid rgba(239,68,68,0.25)',color:'#FCA5A5',fontSize:13,fontWeight:700,cursor:'pointer' }}>✕ Deny</button>
                    </div>
                  </div>
                ))}
              </div>
            )}

            {/* Approved guests */}
            {approvedGuests.length>0&&(
              <div style={{ marginBottom:20 }}>
                <h4 style={{ fontSize:14,fontWeight:800,color:'#10B981',marginBottom:10 }}>✅ Approved ({approvedGuests.length})</h4>
                {approvedGuests.map(g=>(
                  <div key={g.id} style={{ display:'flex',alignItems:'center',gap:12,padding:'11px 14px',background:'rgba(255,255,255,0.02)',border:'1px solid rgba(255,255,255,0.06)',borderRadius:14,marginBottom:8 }}>
                    <Avatar user={{ id:g.id,name:g.name,photoURL:g.photoURL }} size={40}/>
                    <div style={{ flex:1,minWidth:0 }}>
                      <div style={{ fontWeight:700,fontSize:14 }}>{g.name}</div>
                      <div style={{ fontSize:12,color:'rgba(255,255,255,0.4)' }}>{g.jobTitle}</div>
                    </div>
                    <button onClick={()=>doUpdateGuest(g.id,'waitlisted')} style={{ background:'none',border:'none',color:'rgba(255,255,255,0.3)',fontSize:12,cursor:'pointer' }}>Move to waitlist</button>
                  </div>
                ))}
              </div>
            )}

            {/* Waitlisted */}
            {waitlistedGuests.length>0&&(
              <div>
                <h4 style={{ fontSize:14,fontWeight:800,color:'#93C5FD',marginBottom:10 }}>📋 Waitlisted ({waitlistedGuests.length})</h4>
                {waitlistedGuests.map(g=>(
                  <div key={g.id} style={{ display:'flex',alignItems:'center',gap:12,padding:'11px 14px',background:'rgba(255,255,255,0.02)',border:'1px solid rgba(255,255,255,0.06)',borderRadius:14,marginBottom:8 }}>
                    <Avatar user={{ id:g.id,name:g.name,photoURL:g.photoURL }} size={40}/>
                    <div style={{ flex:1,minWidth:0 }}>

                    <button onClick={()=>doUpdateGuest(g.id,'approved')} style={{ background:'rgba(16,185,129,0.15)',border:'1px solid rgba(16,185,129,0.3)',borderRadius:8,padding:'6px 10px',color:'#10B981',fontSize:12,fontWeight:700,cursor:'pointer' }}>Approve</button>
                  </div>
                ))}
              </div>
            )}

            {guests.length===0&&<div style={{ textAlign:'center',padding:'30px 0',color:'rgba(255,255,255,0.3)',fontSize:14 }}>No guest requests yet. Share your event link!</div>}
          </div>
        )}
      </div>
    </div>
  );
};

/* ═══════════════════════════════════════════════════════════
   DM SCREEN
   ═══════════════════════════════════════════════════════════ */
const DMScreen = ({ user, currentUser, onBack }) => {
  const [msgs, setMsgs] = useState([]);
  const [input, setInput] = useState('');
  const bottomRef = useRef(null);
  const id = dmId(currentUser?.id||'', user?.id||'');

  useEffect(()=>{
    if (!id||id==='__') return;
    const unsub = watchDMMessages(id, setMsgs);
    return ()=>unsub();
  },[id]);

  useEffect(()=>{ bottomRef.current?.scrollIntoView({behavior:'smooth'}); },[msgs]);

  const send = async () => {
    if (!input.trim()||!currentUser?.id) return;
    const text = input;
    setInput('');
    await sendMessage(id, currentUser.id, text);
  };

  return (
    <div style={{ minHeight:'100vh',background:'#08080F',display:'flex',flexDirection:'column' }}>
      <div style={{ padding:'52px 16px 14px',display:'flex',alignItems:'center',gap:12,borderBottom:'1px solid rgba(255,255,255,0.06)',background:'rgba(8,8,15,0.95)',backdropFilter:'blur(20px)',flexShrink:0 }}>
        <button onClick={onBack} style={{ background:'rgba(255,255,255,0.08)',border:'none',borderRadius:'50%',width:38,height:38,color:'#fff',fontSize:18,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0 }}>←</button>
        <Avatar user={user} size={40} online/>
        <div style={{ flex:1 }}>
          <div style={{ fontWeight:800,fontSize:16 }}>{user?.name}</div>
          <div style={{ fontSize:12,color:'rgba(255,255,255,0.45)' }}>{user?.jobTitle}</div>
        </div>
        <div style={{ display:'flex',gap:6 }}>
          {user?.instagram && <a href={`https://instagram.com/${user.instagram}`} target="_blank" rel="noopener noreferrer" style={{ width:34,height:34,borderRadius:'50%',background:'rgba(225,48,108,0.15)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,textDecoration:'none' }}>📸</a>}
          {user?.tiktok && <a href={`https://tiktok.com/@${user.tiktok}`} target="_blank" rel="noopener noreferrer" style={{ width:34,height:34,borderRadius:'50%',background:'rgba(255,255,255,0.07)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,textDecoration:'none' }}>🎵</a>}
        </div>
      </div>
      <div style={{ flex:1,padding:'16px',display:'flex',flexDirection:'column',gap:10,overflowY:'auto' }}>
        {msgs.length===0 && (
          <div style={{ textAlign:'center',marginTop:40 }}>
            <Avatar user={user} size={64} ring/>
            <p style={{ marginTop:12,color:'rgba(255,255,255,0.4)',fontSize:14 }}>Say hi to {user?.name?.split(' ')[0]}!</p>
          </div>
        )}
        {msgs.map(m=>{
          const isMe = m.senderId===currentUser?.id;
          return (
            <div key={m.id} style={{ display:'flex',justifyContent:isMe?'flex-end':'flex-start',gap:8,alignItems:'flex-end' }}>
              {!isMe && <Avatar user={user} size={28}/>}
              <div style={{ maxWidth:'72%',padding:'11px 15px',borderRadius:isMe?'18px 18px 4px 18px':'18px 18px 18px 4px',background:isMe?'linear-gradient(135deg,#6D28D9,#9D174D)':'rgba(255,255,255,0.08)',fontSize:14,lineHeight:1.55,color:'#fff' }}>
                {m.text}
              </div>
            </div>
          );
        })}
        <div ref={bottomRef}/>
      </div>
      <div style={{ padding:'12px 16px 32px',borderTop:'1px solid rgba(255,255,255,0.06)',display:'flex',gap:10,alignItems:'center',background:'#08080F',flexShrink:0 }}>
        <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&send()} placeholder={`Message ${user?.name?.split(' ')[0]}...`} style={{ flex:1,padding:'12px 16px',borderRadius:99,background:'rgba(255,255,255,0.07)',border:'1px solid rgba(255,255,255,0.1)',color:'#fff',fontSize:14 }}/>
        <button onClick={send} style={{ width:44,height:44,borderRadius:'50%',background:'linear-gradient(135deg,#7C3AED,#C026D3)',border:'none',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,flexShrink:0,boxShadow:'0 4px 16px rgba(124,58,237,0.5)' }}>➤</button>
      </div>
    </div>
  );
};

/* ═══════════════════════════════════════════════════════════
   CREATE EVENT SCREEN
   ═══════════════════════════════════════════════════════════ */
const CreateScreen = ({ currentUser, onBack, onCreated }) => {
  const [form, setForm] = useState({ name:'',location:'',date:'',time:'',privacy:'invite',description:'',emoji:'🔥' });
  const [flyerFile, setFlyerFile] = useState(null);
  const [flyerPreview, setFlyerPreview] = useState(null);
  const [loading, setLoading] = useState(false);
  const [done, setDone] = useState(false);
  const toast = useToast();
  const flyerRef = useRef(null);

  const set = k => e => setForm(f=>({...f,[k]:e.target.value}));
  const GRADIENTS = ['linear-gradient(135deg,#3B0764,#7C3AED)','linear-gradient(135deg,#052e16,#065F46)','linear-gradient(135deg,#431407,#9D174D)','linear-gradient(135deg,#0c2461,#1e3799)','linear-gradient(135deg,#1a1a2e,#16213e)'];
  const [gradIdx, setGradIdx] = useState(0);
  const EMOJIS = ['🔥','🎭','🍸','🎶','🤝','🚀','🎨','💡','🌆','🎉'];

  const submit = async () => {
    if (!form.name.trim()) return toast('Give your event a name', 'error');
    if (!form.location.trim()) return toast('Add a location', 'error');
    setLoading(true);
    try {
      let flyerURL = null;
      if (flyerFile) {
        const eventId = Date.now().toString();
        flyerURL = await uploadFile(`flyers/${eventId}/flyer.jpg`, flyerFile);
      }
      await createEvent({
        name: form.name.trim(),
        location: form.location.trim(),
        description: form.description.trim(),
        time: form.date && form.time ? `${form.date} · ${form.time}` : form.date || form.time || '',
        privacy: form.privacy,
        emoji: form.emoji,
        gradient: GRADIENTS[gradIdx],
        hostId: currentUser?.id,
        hostName: currentUser?.name,
        isLive: false,
        checkedInCount: 0,
        total: 0,
        flyerURL,
      });
      setDone(true);
    } catch(e) {
      toast(e.message||'Failed to create event', 'error');
    } finally { setLoading(false); }
  };

  if (done) return (
    <div style={{ minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:28,textAlign:'center',background:'#08080F' }}>
      <div style={{ fontSize:64,marginBottom:16 }}>🎉</div>
      <h2 style={{ fontSize:28,fontWeight:900,letterSpacing:-0.5,marginBottom:8 }}>Event Created!</h2>
      <p style={{ color:'rgba(255,255,255,0.5)',fontSize:16,marginBottom:32,lineHeight:1.55 }}>"{form.name}" is live. Share the link to invite your people.</p>
      <button onClick={()=>{onCreated();onBack();}} className="btn-primary" style={{ padding:'14px 36px',borderRadius:99,fontSize:16,border:'none' }}>Back to Home</button>
    </div>
  );

  return (
    <div style={{ minHeight:'100vh',background:'#08080F' }}>
      <div style={{ padding:'52px 20px 16px',display:'flex',alignItems:'center',gap:12,borderBottom:'1px solid rgba(255,255,255,0.06)' }}>
        <button onClick={onBack} style={{ background:'rgba(255,255,255,0.08)',border:'none',borderRadius:'50%',width:38,height:38,color:'#fff',fontSize:18,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center' }}>←</button>
        <h2 style={{ fontSize:22,fontWeight:900,letterSpacing:-0.3 }}>Create Event</h2>
      </div>
      <div style={{ padding:'22px 20px 40px' }}>
        {/* Hidden file input */}
        <input
          ref={flyerRef}
          type="file"
          accept="image/*"
          style={{ display:'none' }}
          onChange={e=>{
            const f=e.target.files[0];
            if(!f)return;
            setFlyerFile(f);
            const reader=new FileReader();
            reader.onload=ev=>setFlyerPreview(ev.target.result);
            reader.readAsDataURL(f);
          }}
        />

        {/* Cover / flyer preview */}
        <button onClick={()=>flyerRef.current.click()} style={{ width:'100%',borderRadius:22,background:flyerPreview?'transparent':GRADIENTS[gradIdx],height:160,display:'flex',alignItems:'center',justifyContent:'center',border:`2px dashed rgba(255,255,255,${flyerPreview?0:0.2})`,marginBottom:12,overflow:'hidden',position:'relative',transition:'background 0.3s',cursor:'pointer' }}>
          {flyerPreview
            ? <img src={flyerPreview} style={{ width:'100%',height:'100%',objectFit:'cover' }}/>
            : <>
                <div style={{ position:'absolute',inset:0,opacity:0.25,backgroundImage:'radial-gradient(rgba(255,255,255,0.08) 1px,transparent 1px)',backgroundSize:'18px 18px' }}/>
                <div style={{ textAlign:'center',position:'relative' }}>
                  <div style={{ fontSize:36,marginBottom:6 }}>{form.emoji}</div>
                  <div style={{ fontSize:13,color:'rgba(255,255,255,0.5)',fontWeight:600 }}>Tap to upload flyer</div>
                </div>
              </>
          }
        </button>

        {/* Gradient & emoji pickers (when no flyer) */}
        {!flyerPreview && (
          <>
            <div style={{ display:'flex',gap:8,marginBottom:12,overflowX:'auto',paddingBottom:4 }}>
              {GRADIENTS.map((g,i)=>(
                <button key={i} onClick={()=>setGradIdx(i)} style={{ width:36,height:36,borderRadius:10,background:g,border:`2px solid ${gradIdx===i?'white':'transparent'}`,flexShrink:0,cursor:'pointer' }}/>
              ))}
            </div>
            <div style={{ display:'flex',gap:8,marginBottom:18,overflowX:'auto',paddingBottom:4 }}>
              {EMOJIS.map(e=>(
